apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: default
spec:
  progressDeadlineSeconds: 40
  replicas: 3
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
        - name: webapp
          image: shadyraccoon/devopsp15:45
          #image: shadyraccoon/devopsp15:45
          ports:
            - containerPort: 8080
          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: CONNECTION_STRING
